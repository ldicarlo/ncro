[server]
listen        = ":8080"
read_timeout  = "30s"
write_timeout = "30s"

[[upstreams]]
priority   = 10
public_key = "cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY="
url        = "https://cache.nixos.org"

# Try without a public key.
[[upstreams]]
priority = 20
url      = "https://nix-community.cachix.org"

[cache]
db_path       = "/var/lib/ncro/routes.db"
latency_alpha = 0.3
max_entries   = 100000
negative_ttl  = "10m"
ttl           = "1h"

[cache.mass_query]
in_memory_negative_ttl    = "5s"
max_concurrent_races      = 64
per_upstream_max_inflight = 8
upstream_cooldown         = "15s"

[discovery]
discovery_time = "5s"
domain         = "local"
enabled        = false
priority       = 20
service_name   = "_nix-serve._tcp"

[mesh]
bind_addr       = "0.0.0.0:7946"
enabled         = false
gossip_interval = "30s"
peers           = [  ]
private_key     = "/etc/ncro/node.key"

[logging]
format = "json"
level  = "info"
